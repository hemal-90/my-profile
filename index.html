<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FontAwesome Logos/Icons Framework -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .profile-card { background: #ffffff; max-width: 450px; width: 90%; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin: 20px auto; border-top: 5px solid #4f46e5; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #e5e7eb; margin-bottom: 15px; }
        h1 { margin: 10px 0 5px 0; font-size: 24px; color: #111827; }
        .bio { font-size: 14px; color: #6b7280; margin-bottom: 20px; font-style: italic; line-height: 1.4; }
        .info-section { text-align: left; background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f3f4f6; }
        .info-item { font-size: 14px; color: #4b5563; margin: 8px 0; display: flex; items: center; }
        .info-item i { margin-right: 10px; color: #4f46e5; width: 16px; text-align: center; }
        
        /* Skills Style */
        .skills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .skill-badge { background: #eeeffe; color: #4f46e5; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px; border: 1px solid #e0e2fe; display: flex; align-items: center; gap: 6px; }
        
        .social-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; transition: background 0.2s; color: #fff; }
        .btn i { margin-right: 8px; }
        .linkedin { background-color: #0077b5; } .linkedin:hover { background-color: #005987; }
        .github { background-color: #24292e; } .github:hover { background-color: #121416; }
        .facebook { background-color: #1877f2; } .facebook:hover { background-color: #0d5ec7; }
        .whatsapp { background-color: #25d366; } .whatsapp:hover { background-color: #1cbd57; }
        .email { background-color: #ea4335; grid-column: span 2; font-size: 13px; } .email:hover { background-color: #c5221f; }
    </style>
</head>

    <div class="profile-card">

        <!-- Professional & Social Connect Actions -->

                <i class="fa-brands fa-linkedin"></i> LinkedIn

            </a>
            <a href="https://www.facebook.com/hemal.2006" target="_blank" class="btn facebook">

            <a href="https://wa.me/+8801610359890" target="_blank" class="btn whatsapp">

            <!-- Visible Email Button -->
            <a href="mailto:hemal.2006@hotmail.com" class="btn email">
                <i class="fa-solid fa-envelope"></i> hemal.2006@hotmail.com
            </a>
        </div>
    </div>

</body>
</html>
